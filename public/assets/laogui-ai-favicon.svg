<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="老鬼AI">
  <defs>
    <filter id="rough" x="-14%" y="-14%" width="128%" height="132%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.18" numOctaves="3" seed="23" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#211a10"/>
      <stop offset="0.58" stop-color="#050505"/>
      <stop offset="1" stop-color="#17110a"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.65" stop-color="#d8b56b"/>
      <stop offset="1" stop-color="#fff3d0"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#bg)"/>
  <rect x="4" y="4" width="88" height="88" rx="17" fill="none" stroke="#d5b16f" stroke-width="1.4" opacity="0.42"/>
  <text x="8" y="58" fill="url(#ink)" filter="url(#rough)"
    font-family="HanziPen SC, Xingkai SC, STXingkai, Kaiti SC, KaiTi, Songti SC, serif"
    font-size="43" font-weight="900" letter-spacing="-7">老鬼</text>
  <rect x="57" y="60" width="28" height="22" rx="4" fill="#9b271d"/>
  <text x="71" y="76" text-anchor="middle" fill="#fff8e8"
    font-family="Inter, Arial Black, Arial, sans-serif"
    font-size="12" font-weight="900" letter-spacing="-0.8">AI</text>
</svg>
